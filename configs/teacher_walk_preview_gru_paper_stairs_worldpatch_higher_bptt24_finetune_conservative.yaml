env:
  model_path: models/pupper_like_preview_terrain.xml
  control_dt: 0.02
  episode_length_s: 28.0
  action_scale: 0.29
  reset_noise_scale: 0.0
  command_min: 0.08
  command_max: 0.18
  command_yaw_min: 0.0
  command_yaw_max: 0.0
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  corridor_half_width: 0.27
  use_privileged_terrain: true
  terrain_obs_mode: stable_world_patch
  terrain_obs_height_reference: center_height
  terrain_patch_rows: 4
  terrain_patch_cols: 5
  terrain_patch_dx: 0.10
  terrain_patch_dy: 0.10
  terrain_patch_center_offset_x: 0.22
  terrain_patch_center_offset_y: 0.0
  scandot_layout: custom
  scandot_min_forward_offset: 0.18
  observation_mode: teacher_dict
  include_privileged_obs: true
  observation_noise_std: 0.0
  scandot_points:
    - [0.20, -0.16]
    - [0.20, -0.10]
    - [0.20, -0.05]
    - [0.20, 0.00]
    - [0.20, 0.05]
    - [0.20, 0.10]
    - [0.20, 0.16]
    - [0.30, -0.16]
    - [0.30, -0.10]
    - [0.30, -0.05]
    - [0.30, 0.00]
    - [0.30, 0.05]
    - [0.30, 0.10]
    - [0.30, 0.16]
    - [0.40, -0.14]
    - [0.40, -0.08]
    - [0.40, 0.00]
    - [0.40, 0.08]
    - [0.40, 0.14]
  terrain_scan_origin_z: 0.35
  terrain_scan_max_dist: 1.2
  terrain_generation:
    stairs_x_start: 0.48
    stairs_half_length: 0.12
    stairs_stride: 0.24
    stairs_half_width: 0.255
    stairs_min_half_height: 0.004
    stairs_height_base: 0.012
    stairs_height_scale: 0.012
    stairs_std_scale: 1.30
    stairs_difficulty_mode: higher_steps
    stairs_warmup_progression: [0.60, 0.80]
    level_scale_overrides:
      "3": 0
      "4": 2
      "5": 2
  privileged_randomization:
    body_mass_range: [1.0, 1.0]
    friction_range: [1.0, 1.0]
    joint_damping_range: [1.0, 1.0]
  curriculum:
    enabled: true
    initial_level: 0
    min_level: 0
    max_level: 5
    window: 16
    promotion_threshold: 0.72
    demotion_threshold: 0.28
    success_distance: 1.2
    failure_distance: 0.35
    success_x_fraction: 0.6666667
    terrain_types: [stairs]
  seed: 0
  reward_weights:
    survival: 1.0
    command_tracking: 7.0
    absolute_work: 0.0001
    foot_jerk: 0.00005
    foot_drag: 0.00005
    collision: 0.25
    contact_force_threshold: 1.0
    collision_force_threshold: 1.0
    fall: 2.0
    stuck: 0.10
    stuck_progress_threshold: 0.05
    stuck_patience_s: 2.0
    stuck_ramp_s: 4.0
    stair_riser_collision: 0.08
    rear_leg_riser_collision: 0.14
    rear_riser_lag_multiplier: 1.75
    stair_riser_contact_margin: 0.018
    stair_riser_top_clearance: 0.012
    step_completion_bonus: 0.80
    step_completion_base_margin: 0.02
    rear_foot_step_bonus: 0.35
    rear_foot_step_margin_x: 0.025
    rear_foot_step_margin_y: 0.02
    rear_foot_step_height_tol: 0.035
    rear_follow_bonus: 5.0
    rear_follow_progress_clip: 0.03
    rear_follow_lift_bonus: 6.0
    rear_follow_lift_clip: 0.025
    rear_follow_airborne_multiplier: 1.3
    rear_lag_penalty: 0.035
    rear_lag_grace_s: 0.6
    support_bonus: 0.08
    support_min_grounded_feet: 2
    multi_air_penalty: 0.14
    multi_air_max_feet: 1

policy:
  teacher_encoder_variant: paper
  include_privileged: false
  hidden_sizes: [256, 256]
  proprio_hidden_dim: 128
  scandot_hidden_dim: 128
  command_hidden_dim: 32
  privileged_hidden_dim: 32
  fused_dim: 256
  lstm_hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true
  init_log_std: -1.3
  min_log_std: -2.0
  max_log_std: -0.8

train:
  seed: 0
  device: cuda
  recurrent: true
  recurrent_cell: gru
  truncated_bptt_steps: 24
  num_envs: 16
  subproc_start_method: fork
  learning_rate: 0.0000333333
  total_updates: 800
  total_timesteps: 6553600
  rollout_steps: 512
  ppo_epochs: 3
  minibatch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.1
  value_coef: 0.5
  entropy_coef: 0.004
  max_grad_norm: 0.35
  target_kl: 0.012
  normalize_obs_keys: [proprio, scandots, command, privileged]
  checkpoint_interval: 25
  output_dir: artifacts/teacher_walk_preview_gru_paper_stairs_worldpatch_higher_bptt24_finetune_conservative
  finetune_model_path: artifacts/teacher_walk_preview_gru_paper_stairs_worldpatch_higher_bptt24/best_teacher.zip
  finetune_vecnormalize_path: artifacts/teacher_walk_preview_gru_paper_stairs_worldpatch_higher_bptt24/best_teacher_vecnormalize.pkl

eval:
  egl_device_id: 0
  eval_interval_timesteps: 65536
  eval_episodes: 5
  early_stop_no_improvement_evals: 10
  early_stop_min_distance_delta: 0.02
  weak_success_distance_m: 0.45
  success_distance_m: 1.2
  min_avg_forward_velocity: 0.06
  success_x_fraction: 0.6666667
  record_best_video: true
  record_recent_video: true
  record_curriculum_showcase: false
  record_pretrain_scene_showcase: true
  video_overlay_metrics: true
  highlight_preview_terrain: false
  render_scandots: true
  render_stair_edges: true
  showcase_success_metric: weak
  showcase_terrain_type: stairs
  showcase_max_level: 5
  showcase_stop_on_failure: false
  video_fps: 24
  video_width: 512
  video_height: 384
  video_camera: tracking

wandb:
  enabled: true
  project: quadruped-teacher
  entity: null
  run_name: teacher-preview-gru-paper-stairs-worldpatch-higher-bptt24-finetune-conservative
  group: preview-gru-paper-stairs-worldpatch-higher-bptt24-finetune-conservative
  tags: [teacher, recurrent, gru, curriculum, scandots, worldpatch, higher-steps, paper-teacher, stairs, bptt24, finetune, conservative-ppo, early-stop]
  mode: online
