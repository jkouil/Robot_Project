env:
  model_path: models/pupper_like_preview_terrain.xml
  control_dt: 0.02
  episode_length_s: 16.0
  action_scale: 0.25
  reset_noise_scale: 0.02
  command_min: 0.15
  command_max: 0.40
  command_yaw_min: 0.0
  command_yaw_max: 0.0
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  corridor_half_width: 0.27
  use_privileged_terrain: true
  scandot_min_forward_offset: 0.18
  observation_mode: teacher_dict
  include_privileged_obs: true
  observation_noise_std: 0.01
  scandot_points:
    - [0.20, -0.16]
    - [0.20, -0.10]
    - [0.20, -0.05]
    - [0.20, 0.00]
    - [0.20, 0.05]
    - [0.20, 0.10]
    - [0.20, 0.16]
    - [0.30, -0.16]
    - [0.30, -0.10]
    - [0.30, -0.05]
    - [0.30, 0.00]
    - [0.30, 0.05]
    - [0.30, 0.10]
    - [0.30, 0.16]
    - [0.40, -0.14]
    - [0.40, -0.08]
    - [0.40, 0.00]
    - [0.40, 0.08]
    - [0.40, 0.14]
  terrain_scan_origin_z: 0.35
  terrain_scan_max_dist: 1.2
  terrain_generation:
    mixed_course_segments: [slope_up, slope_down, stepping_stones, stairs, discrete_obstacles]
    segment_tile_counts:
      slope_up: 2
      slope_down: 2
      stepping_stones: 3
      stairs: 2
      discrete_obstacles: 2
    mixed_course_x_start: 0.52
    mixed_course_segment_gap: 0.18
    mixed_first_segment_scale: 0.55
    slope_half_length: 0.20
    slope_stride: 0.22
    slope_rise_base: 0.03
    slope_rise_scale: 0.07
    slope_thickness: 0.012
    stairs_half_length: 0.10
    stairs_stride: 0.20
    stepping_stone_lateral_choices: [-0.12, 0.0, 0.12]
    stepping_stone_half_width_min: 0.05
    stepping_stone_half_width_max: 0.075
    stepping_stone_half_length_min: 0.07
    stepping_stone_half_length_max: 0.10
    stepping_stone_gap_min: 0.10
    stepping_stone_gap_max: 0.16
  privileged_randomization:
    body_mass_range: [0.9, 1.1]
    friction_range: [0.8, 1.2]
    joint_damping_range: [0.9, 1.15]
  curriculum:
    enabled: true
    initial_level: 0
    min_level: 0
    max_level: 6
    window: 16
    promotion_threshold: 0.75
    demotion_threshold: 0.30
    success_distance: 3.0
    failure_distance: 0.75
    terrain_types: [mixed_course]
  seed: 0
  reward_weights:
    survival: 1.0
    command_tracking: 7.0
    absolute_work: 0.0001
    foot_jerk: 0.0001
    foot_drag: 0.0001
    collision: 1.0
    contact_force_threshold: 1.0
    collision_force_threshold: 0.1
    fall: 2.0

policy:
  teacher_encoder_variant: paper
  include_privileged: false
  hidden_sizes: [256, 256]
  proprio_hidden_dim: 128
  scandot_hidden_dim: 128
  command_hidden_dim: 32
  privileged_hidden_dim: 32
  fused_dim: 256
  lstm_hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true
  init_log_std: -1.0
  min_log_std: -2.0
  max_log_std: -0.5

train:
  seed: 0
  device: cuda
  recurrent: true
  recurrent_cell: gru
  num_envs: 4
  subproc_start_method: fork
  learning_rate: 0.0001
  total_updates: 3000
  rollout_steps: 1024
  ppo_epochs: 8
  minibatch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.005
  max_grad_norm: 0.5
  target_kl: 0.02
  normalize_obs_keys: [proprio, scandots, command, privileged]
  checkpoint_interval: 25
  output_dir: artifacts/teacher_walk_preview_gru_paper_teacher

eval:
  eval_interval_timesteps: 163840
  eval_episodes: 5
  weak_success_distance_m: 1.0
  success_distance_m: 3.0
  min_avg_forward_velocity: 0.16
  record_best_video: true
  record_recent_video: true
  record_curriculum_showcase: false
  highlight_preview_terrain: true
  render_scandots: true
  showcase_success_metric: weak
  showcase_terrain_type: mixed_course
  showcase_max_level: 6
  showcase_stop_on_failure: false
  video_fps: 24
  video_width: 512
  video_height: 384
  video_camera: tracking

wandb:
  enabled: true
  project: quadruped-teacher
  entity: null
  run_name: teacher-preview-gru-paper-teacher
  group: preview-gru-paper-teacher
  tags: [teacher, recurrent, gru, curriculum, scandots, paper-teacher]
  mode: online
