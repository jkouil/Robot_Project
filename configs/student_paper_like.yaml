teacher:
  checkpoint: artifacts/teacher_walk_preview_gru_random_slopes_shifted_no_corridor_iterative_finetune/v11/best_teacher.zip
  vecnormalize: artifacts/teacher_walk_preview_gru_random_slopes_shifted_no_corridor_iterative_finetune/v11/best_teacher_vecnormalize.pkl
  config: configs/teacher_walk_preview_gru_random_slopes_shifted_no_corridor.yaml

student:
  architecture: paper_like
  depth_feature_dim: 128
  gru_hidden_size: 256
  gru_layers: 1
  copy_teacher_gru: true
  copy_teacher_action_head: true
  device: cuda
  depth:
    enabled: true
    height: 58
    width: 87
    near: 0.05
    far: 2.0
    normalize: true
    camera: front_camera

bc:
  dataset_path: artifacts/student_paper_like/bc_dataset.pt
  save_dir: artifacts/student_paper_like_bc
  num_steps: 100000
  batch_size: 64
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0
  bptt_len: 24
  val_fraction: 0.1

dagger:
  enabled: true
  init_checkpoint: artifacts/student_paper_like_bc/best_student.pt
  save_dir: artifacts/student_paper_like_dagger
  rounds: 5
  rollout_steps_per_round: 20000
  train_epochs_per_round: 5
  learning_rate: 0.0001
  weight_decay: 0.0
  batch_size: 64
  bptt_len: 24
  max_buffer_transitions: 300000
  include_bc_dataset: true
  save_replay_dataset: false
  val_fraction: 0.1

eval:
  episodes: 100
  seed: 12345
  save_dir: artifacts/student_paper_like_eval
  old_config: configs/teacher_walk_preview_gru_random_slopes_no_corridor_finetune.yaml
  shift_config: configs/teacher_walk_preview_gru_random_slopes_shifted_no_corridor.yaml
  hard_heldout_config: configs/teacher_walk_preview_gru_random_slopes_shifted_hard_heldout.yaml
  terrains: [random_slope_old, random_slope_shift, random_slope_shift_hard_heldout]
  metrics: [fall_rate, avg_distance, avg_forward_velocity, avg_return, weak_success_rate, strict_success_rate]

wandb:
  enabled: true
  project: quadruped-student
  entity: null
  run_name: student-paper-like
  group: student-paper-like
  tags: [student, paper-like, bc, dagger, depth, gru, random-slopes]
  mode: online
