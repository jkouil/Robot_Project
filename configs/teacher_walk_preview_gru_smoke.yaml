env:
  model_path: models/pupper_like_preview_terrain.xml
  control_dt: 0.02
  episode_length_s: 10.0
  action_scale: 0.25
  reset_noise_scale: 0.02
  command_min: 0.15
  command_max: 0.40
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  corridor_half_width: 0.27
  use_privileged_terrain: true
  scandot_min_forward_offset: 0.18
  observation_mode: teacher_dict
  include_privileged_obs: true
  observation_noise_std: 0.01
  scandot_points:
    - [0.20, -0.16]
    - [0.20, -0.10]
    - [0.20, -0.05]
    - [0.20, 0.00]
    - [0.20, 0.05]
    - [0.20, 0.10]
    - [0.20, 0.16]
    - [0.30, -0.16]
    - [0.30, -0.10]
    - [0.30, -0.05]
    - [0.30, 0.00]
    - [0.30, 0.05]
    - [0.30, 0.10]
    - [0.30, 0.16]
    - [0.40, -0.14]
    - [0.40, -0.08]
    - [0.40, 0.00]
    - [0.40, 0.08]
    - [0.40, 0.14]
  terrain_scan_origin_z: 0.35
  terrain_scan_max_dist: 1.2
  privileged_randomization:
    body_mass_range: [0.9, 1.1]
    friction_range: [0.8, 1.2]
    joint_damping_range: [0.9, 1.15]
  curriculum:
    enabled: true
    initial_level: 0
    min_level: 0
    max_level: 6
    window: 16
    promotion_threshold: 0.75
    demotion_threshold: 0.30
    success_distance: 1.9
    failure_distance: 0.45
    terrain_types: [rough_flat, slopes, stairs_curbs, discrete_obstacles]
  seed: 0
  reward_weights:
    velocity_tracking: 2.4
    velocity_sigma: 8.0
    forward_progress: 0.2
    forward_velocity_clip: 0.8
    upright: 0.0
    upright_min: 0.7
    base_height: 0.0
    nominal_base_height: 0.19
    base_height_sigma: 120.0
    heading_sigma: 18.0
    heading_forward_min: 0.8
    direction_gate_min: 1.0
    obstacle_clearance: 0.0
    survival: 0.02
    survival_velocity_scale: 0.12
    energy: 0.001
    action_smoothness: 0.004
    lateral_velocity: 0.005
    yaw_rate: 0.005
    centerline: 0.0
    torso_obstacle_contact: 0.18
    leg_obstacle_contact: 0.04
    foot_drag: 0.02
    foot_jerk: 0.0005
    foot_drag_height: 0.035
    stuck: 0.25
    stuck_velocity_threshold: 0.12
    clearance_margin: 0.03
    clearance_height: 0.05
    fall: 2.0

policy:
  teacher_encoder_variant: current
  include_privileged: true
  hidden_sizes: [256, 256]
  proprio_hidden_dim: 128
  scandot_hidden_dim: 128
  command_hidden_dim: 32
  privileged_hidden_dim: 32
  fused_dim: 256
  lstm_hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true
  init_log_std: -1.0
  min_log_std: -2.0
  max_log_std: -0.5

train:
  seed: 0
  device: cuda
  recurrent: true
  recurrent_cell: gru
  num_envs: 4
  subproc_start_method: fork
  learning_rate: 0.0003
  total_updates: 80
  rollout_steps: 1024
  ppo_epochs: 10
  minibatch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.015
  max_grad_norm: 0.5
  target_kl: 0.04
  normalize_obs_keys: [proprio, scandots, command, privileged]
  checkpoint_interval: 20
  output_dir: artifacts/teacher_walk_preview_gru_smoke

eval:
  eval_interval_timesteps: 32768
  eval_episodes: 2
  weak_success_distance_m: 0.6
  success_distance_m: 2.0
  min_avg_forward_velocity: 0.18
  record_best_video: true
  record_recent_video: true
  record_curriculum_showcase: false
  highlight_preview_terrain: true
  render_scandots: true
  showcase_success_metric: weak
  showcase_terrain_type: stairs_curbs
  showcase_max_level: 6
  showcase_stop_on_failure: false
  video_fps: 24
  video_width: 512
  video_height: 384
  video_camera: tracking

wandb:
  enabled: true
  project: quadruped-teacher
  entity: null
  run_name: teacher-preview-gru-smoke
  group: preview-gru-smoke
  tags: [teacher, recurrent, gru, curriculum, scandots, smoke]
  mode: online
