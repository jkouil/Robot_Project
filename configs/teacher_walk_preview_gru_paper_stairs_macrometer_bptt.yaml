env:
  model_path: models/pupper_like_preview_terrain.xml
  control_dt: 0.02
  episode_length_s: 28.0
  action_scale: 0.27
  reset_noise_scale: 0.02
  command_min: 0.08
  command_max: 0.18
  command_yaw_min: 0.0
  command_yaw_max: 0.0
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  corridor_half_width: 0.27
  use_privileged_terrain: true
  scandot_min_forward_offset: 0.18
  observation_mode: teacher_dict
  include_privileged_obs: true
  observation_noise_std: 0.01
  scandot_points:
    - [0.20, -0.16]
    - [0.20, -0.10]
    - [0.20, -0.05]
    - [0.20, 0.00]
    - [0.20, 0.05]
    - [0.20, 0.10]
    - [0.20, 0.16]
    - [0.30, -0.16]
    - [0.30, -0.10]
    - [0.30, -0.05]
    - [0.30, 0.00]
    - [0.30, 0.05]
    - [0.30, 0.10]
    - [0.30, 0.16]
    - [0.40, -0.14]
    - [0.40, -0.08]
    - [0.40, 0.00]
    - [0.40, 0.08]
    - [0.40, 0.14]
  terrain_scan_origin_z: 0.35
  terrain_scan_max_dist: 1.2
  terrain_generation:
    stairs_half_length: 0.12
    stairs_stride: 0.22
    stairs_half_width: 0.255
    stairs_min_half_height: 0.004
    stairs_height_base: 0.014
    stairs_height_scale: 0.016
    stairs_warmup_progression: [0.55, 0.75]
  privileged_randomization:
    body_mass_range: [0.98, 1.02]
    friction_range: [0.95, 1.05]
    joint_damping_range: [0.98, 1.02]
  curriculum:
    enabled: true
    initial_level: 0
    min_level: 0
    max_level: 5
    window: 16
    promotion_threshold: 0.72
    demotion_threshold: 0.28
    success_distance: 1.2
    failure_distance: 0.35
    terrain_types: [rough_flat, stairs]
  seed: 0
  reward_weights:
    survival: 1.0
    command_tracking: 7.0
    absolute_work: 0.0001
    foot_jerk: 0.00005
    foot_drag: 0.00005
    collision: 0.35
    contact_force_threshold: 1.0
    collision_force_threshold: 1.0
    fall: 2.0

policy:
  teacher_encoder_variant: paper
  include_privileged: false
  hidden_sizes: [256, 256]
  proprio_hidden_dim: 128
  scandot_hidden_dim: 128
  command_hidden_dim: 32
  privileged_hidden_dim: 32
  fused_dim: 256
  lstm_hidden_size: 256
  n_lstm_layers: 1
  init_log_std: -1.0
  min_log_std: -2.0
  max_log_std: -0.5

train:
  seed: 0
  device: cuda
  recurrent: true
  recurrent_cell: gru
  truncated_bptt_steps: 24
  num_envs: 16
  learning_rate: 0.0001
  total_updates: 5000
  total_timesteps: 10000000
  rollout_steps: 512
  ppo_epochs: 5
  minibatch_size: 512
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.003
  max_grad_norm: 0.5
  target_kl: 0.025
  normalize_obs_keys: [proprio, scandots, command, privileged]
  checkpoint_interval: 25
  output_dir: artifacts/teacher_walk_preview_gru_paper_stairs_macrometer_bptt24

eval:
  eval_interval_timesteps: 327680
  eval_episodes: 5
  weak_success_distance_m: 0.45
  success_distance_m: 1.2
  min_avg_forward_velocity: 0.06
  record_best_video: true
  record_recent_video: true
  highlight_preview_terrain: true
  render_scandots: true
  showcase_success_metric: weak
  showcase_terrain_type: stairs
  showcase_max_level: 5
  showcase_stop_on_failure: false
  video_fps: 24
  video_width: 512
  video_height: 384
  video_camera: tracking

wandb:
  enabled: false
  project: quadruped-teacher
  entity: null
  run_name: teacher-preview-gru-paper-stairs-macrometer-bptt24
  group: preview-gru-paper-stairs-macrometer-bptt24
  tags: [teacher, recurrent, gru, curriculum, scandots, paper-teacher, stairs, macrometer-bptt24]
  mode: online
