env:
  model_path: models/pupper_like.xml
  control_dt: 0.02
  episode_length_s: 10.0
  action_scale: 0.25
  reset_noise_scale: 0.025
  command_min: 0.25
  command_max: 0.80
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  seed: 0
  reward_weights:
    velocity_tracking: 1.2
    velocity_sigma: 8.0
    forward_progress: 0.4
    forward_velocity_clip: 0.8
    upright: 0.5
    upright_min: 0.7
    base_height: 0.4
    nominal_base_height: 0.19
    base_height_sigma: 120.0
    energy: 0.002
    action_smoothness: 0.01
    fall: 1.0

policy:
  hidden_sizes: [256, 256]
  init_log_std: -1.0
  min_log_std: -2.0
  max_log_std: -0.5

train:
  seed: 0
  device: cpu
  learning_rate: 0.0003
  total_updates: 500
  rollout_steps: 2048
  ppo_epochs: 10
  minibatch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.015
  max_grad_norm: 0.5
  target_kl: 0.02
  checkpoint_interval: 25
  output_dir: artifacts/teacher_walk

eval:
  eval_interval_timesteps: 20480
  eval_episodes: 5
  weak_success_distance_m: 1.0
  success_distance_m: 3.0
  min_avg_forward_velocity: 0.25
  record_best_video: true
  video_fps: 30
  video_width: 640
  video_height: 480
  video_camera: tracking
