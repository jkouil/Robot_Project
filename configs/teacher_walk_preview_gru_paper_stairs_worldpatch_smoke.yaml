env:
  model_path: models/pupper_like_preview_terrain.xml
  control_dt: 0.02
  episode_length_s: 6.0
  action_scale: 0.27
  reset_noise_scale: 0.0
  command_min: 0.10
  command_max: 0.12
  command_yaw_min: 0.0
  command_yaw_max: 0.0
  healthy_z_min: 0.09
  healthy_torso_up_min: 0.45
  corridor_half_width: 0.27
  use_privileged_terrain: true
  terrain_obs_mode: stable_world_patch
  terrain_obs_height_reference: center_height
  terrain_patch_rows: 4
  terrain_patch_cols: 5
  terrain_patch_dx: 0.10
  terrain_patch_dy: 0.10
  terrain_patch_center_offset_x: 0.22
  terrain_patch_center_offset_y: 0.0
  scandot_layout: custom
  observation_mode: teacher_dict
  include_privileged_obs: true
  observation_noise_std: 0.0
  terrain_generation:
    stairs_x_start: 0.48
    stairs_half_length: 0.09
    stairs_stride: 0.18
    stairs_half_width: 0.255
    stairs_min_half_height: 0.004
    stairs_height_base: 0.014
    stairs_height_scale: 0.016
    stairs_std_scale: 1.20
    stairs_difficulty_mode: higher_steps
    stairs_warmup_progression: [0.55, 0.75]
  privileged_randomization:
    body_mass_range: [1.0, 1.0]
    friction_range: [1.0, 1.0]
    joint_damping_range: [1.0, 1.0]
  curriculum:
    enabled: true
    initial_level: 3
    min_level: 0
    max_level: 5
    window: 4
    promotion_threshold: 1.0
    demotion_threshold: 0.0
    success_distance: 0.6
    failure_distance: 0.1
    terrain_types: [stairs]
  seed: 7
  reward_weights:
    survival: 1.0
    command_tracking: 7.0
    absolute_work: 0.0001
    foot_jerk: 0.00005
    foot_drag: 0.00005
    collision: 0.35
    contact_force_threshold: 1.0
    collision_force_threshold: 1.0
    fall: 2.0

policy:
  teacher_encoder_variant: paper
  include_privileged: false
  hidden_sizes: [256, 256]
  proprio_hidden_dim: 128
  scandot_hidden_dim: 128
  command_hidden_dim: 32
  privileged_hidden_dim: 32
  fused_dim: 256
  lstm_hidden_size: 256
  n_lstm_layers: 1
  shared_lstm: false
  enable_critic_lstm: true
  init_log_std: -1.0
  min_log_std: -2.0
  max_log_std: -0.5

train:
  seed: 7
  device: cpu
  recurrent: true
  recurrent_cell: gru
  truncated_bptt_steps: 24
  num_envs: 1
  learning_rate: 0.0001
  total_updates: 1
  total_timesteps: 24
  rollout_steps: 24
  ppo_epochs: 1
  minibatch_size: 24
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.003
  max_grad_norm: 0.5
  target_kl: 0.025
  normalize_obs_keys: [proprio, scandots, command, privileged]
  checkpoint_interval: 1
  output_dir: artifacts/worldpatch_smoke

eval:
  eval_interval_timesteps: 24
  eval_episodes: 1
  weak_success_distance_m: 0.1
  success_distance_m: 0.3
  min_avg_forward_velocity: 0.02
  record_best_video: true
  record_recent_video: true
  highlight_preview_terrain: false
  render_scandots: true
  showcase_terrain_type: stairs
  showcase_max_level: 3
  showcase_stop_on_failure: false
  video_fps: 12
  video_width: 512
  video_height: 384
  video_camera: tracking

wandb:
  enabled: false
  project: quadruped-teacher
  entity: null
  run_name: worldpatch-smoke
  group: smoke
  tags: [smoke, worldpatch, higher-steps, stairs]
  mode: offline
